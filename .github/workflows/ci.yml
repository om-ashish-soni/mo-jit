name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go build + test + vet
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  android-cross:
    name: Android arm64 cross-build (gate + cmd)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Cross-compile gate + cmd for android/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: android
          GOARCH: arm64
        run: |
          go build ./gate/...
          go build ./cmd/...

  lint:
    name: gofmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: gofmt diff
        run: |
          diff -u <(echo -n) <(gofmt -d .)
