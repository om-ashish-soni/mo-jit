name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go build + test + vet
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  android-cross:
    name: Android arm64 cross-build (gate + cmd)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Cross-compile gate + cmd for android/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: android
          GOARCH: arm64
        run: |
          go build ./gate/...
          go build ./cmd/...

  lint:
    name: gofmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: gofmt diff
        run: |
          diff -u <(echo -n) <(gofmt -d .)

  gum-c-abi:
    name: gum C ABI tests (svc hook + memfd allocator)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build and run mojit_hook_test
        run: |
          cc -std=c11 -Wall -Wextra -Werror -pthread \
             gum/mojit_hook.c gum/mojit_hook_test.c \
             -o /tmp/mojit_hook_test
          /tmp/mojit_hook_test
      - name: Build and run memfd_alloc_test
        run: |
          cc -std=c11 -Wall -Wextra -Werror -pthread \
             gum/memfd_alloc.c gum/memfd_alloc_test.c \
             -o /tmp/memfd_alloc_test
          /tmp/memfd_alloc_test
